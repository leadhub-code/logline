# This workflow installs dependencies with uv and runs the end-to-end tests
# across a range of Python versions.

name: E2E tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:

  test_e2e:

    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11']

    steps:
    - uses: actions/checkout@v5
    - name: Install uv
      uses: astral-sh/setup-uv@v6
    - name: Install dependencies
      run: uv sync --python ${{ matrix.python-version }}
    - name: Test with pytest
      run: uv run pytest -v --tb=native -p no:logging e2e_tests
