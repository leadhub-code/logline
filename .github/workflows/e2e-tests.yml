# This workflow installs the agent and server with uv and runs the end-to-end
# test suite across a range of Python versions.
# For more information see: https://docs.astral.sh/uv/guides/integration/github/

name: E2E tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:

  test_e2e:

    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.9', '3.10', '3.11', '3.12', '3.13', '3.14']

    steps:
    - uses: actions/checkout@v6
    - name: Install uv
      uses: astral-sh/setup-uv@v6
      with:
        python-version: ${{ matrix.python-version }}
    - name: Test with pytest
      run: |
        cd e2e_tests
        uv run --frozen pytest -v --tb=native -p no:logging tests
