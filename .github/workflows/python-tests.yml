# This workflow installs dependencies with uv, lints with ruff and runs the
# test suite across a range of Python versions.
# For more information see: https://docs.astral.sh/uv/guides/integration/github/

name: Python tests

on:
  push:
    branches: [ main ]
  pull_request:

permissions:
  contents: read

jobs:

  test_agent:

    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.9', '3.10', '3.11', '3.12', '3.13', '3.14']

    steps:
    - uses: actions/checkout@v6
    - name: Install uv
      uses: astral-sh/setup-uv@v6
      with:
        python-version: ${{ matrix.python-version }}
    - name: Lint with ruff
      run: |
        cd agent
        uvx ruff check .
    - name: Test with pytest
      run: |
        cd agent
        uv run --frozen pytest -v tests

  test_server:

    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.9', '3.10', '3.11', '3.12', '3.13', '3.14']

    steps:
    - uses: actions/checkout@v6
    - name: Install uv
      uses: astral-sh/setup-uv@v6
      with:
        python-version: ${{ matrix.python-version }}
    - name: Lint with ruff
      run: |
        cd server
        uvx ruff check .
    - name: Test with pytest
      run: |
        cd server
        uv run --frozen pytest -v tests
