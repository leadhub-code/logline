[project]
name = "logline-server"
version = "0.0.1"
description = "Logline Server"
readme = "README.md"
requires-python = ">=3.7"
license = "MIT"
classifiers = [
    "Programming Language :: Python :: 3",
    "Operating System :: OS Independent",
]
dependencies = [
    "pyyaml",
]

[project.urls]
Homepage = "https://github.com/leadhub-code/logline"

[project.scripts]
logline-server = "logline_server:server_main"

[build-system]
requires = ["uv_build>=0.11.6,<0.12.0"]
build-backend = "uv_build"

[tool.uv.build-backend]
# Flat layout: the importable package lives at server/logline_server, not under src/.
module-root = ""
